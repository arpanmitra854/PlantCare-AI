<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PlantCare AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=Poppins:wght@400;600;700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style4.css">
    <script type="module" src="login.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-hero auth-hero--login" aria-label="Login visual panel">
            <img class="auth-hero-img" src="LOGIN1.jpg" alt="Plant leaves background">
            <div class="hero-overlay-copy">
                <h2>Smart Plant Monitoring</h2>
                <p>Track plant health and detect disease faster with AI-powered insights.</p>
            </div>
        </section>

        <section class="auth-card">
            <div class="header">
                <h1 class="page-title">Login</h1>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <a href="#" id="forgot-password" class="forgot-link">Forgot password?</a>
                <button type="submit" id="login-button" class="btn-primary">Sign In</button>
            </form>

            <section id="otp-step" class="otp-panel hidden">
                <h2>OTP Verification</h2>
                <p>Enter the 6-digit code to authorize your account.</p>
                <div class="form-group">
                    <label for="otp">OTP Code</label>
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
                </div>
                <div class="otp-actions">
                    <button type="button" id="verify-otp-button" class="btn-primary">Verify OTP</button>
                    <button type="button" id="resend-otp-button" class="btn-secondary">Resend OTP</button>
                </div>
            </section>

            <p class="auth-status" id="login-status">Use your registered email and password to continue.</p>
            <div class="auth-footer">Don't have an account? <a href="../Signup/index5.html">Create an account</a></div>
        </section>
    </main>
</body>
</html>
