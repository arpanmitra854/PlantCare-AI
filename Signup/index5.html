<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | PlantCare AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style5.css">
    <script type="module" src="signup.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-hero auth-hero--signup" aria-label="Signup visual panel">
            <img class="auth-hero-img" src="SIGNUP1.jpg" alt="Plant in pot background">
            <div class="hero-overlay-copy">
                <h2>Grow Smarter with AI</h2>
                <p>Monitor plant health, detect diseases early, and take better care of your plants with intelligent insights.</p>
            </div>
        </section>

        <section class="auth-card">
            <div class="header">
                <h1 class="page-title">Sign Up</h1>
                <p class="page-subtitle">Enter your details to create your account.</p>
            </div>

            <form id="signup-form" class="auth-form">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" placeholder="Enter your phone number" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="">Select gender</option>
                            <option value="Female">Female</option>
                            <option value="Male">Male</option>
                            <option value="Non-binary">Non-binary</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                    </div>
                    <div class="form-group full-width">
                        <label for="deviceId">Device ID</label>
                        <input type="text" id="deviceId" placeholder="Enter your device ID" required>
                    </div>
                </div>
                <p class="auth-status" id="signup-status">Create your account, then login to complete OTP authorization.</p>
                <button type="submit" id="signup-button" class="btn-primary">Create Account</button>
            </form>

            <div class="auth-footer">Already have an account? <a href="../Login/index4.html">Login</a></div>
        </section>
    </main>
</body>
</html>
